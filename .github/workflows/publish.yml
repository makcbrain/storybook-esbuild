name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Bump versions
        run: |
          node -e "
            const fs = require('fs');
            const semver = require('semver');
            const bump = '${{ inputs.bump }}';
            const versions = {};
            for (const pkg of ['packages/builder-esbuild', 'packages/framework-react-esbuild']) {
              const path = pkg + '/package.json';
              const json = JSON.parse(fs.readFileSync(path, 'utf8'));
              json.version = semver.inc(json.version, bump);
              versions[json.name] = json.version;
              fs.writeFileSync(path, JSON.stringify(json, null, '\t') + '\n');
              console.log(pkg + ': ' + json.version);
            }

            const fwPath = 'packages/framework-react-esbuild/package.json';
            const fw = JSON.parse(fs.readFileSync(fwPath, 'utf8'));
            for (const [dep, ver] of Object.entries(fw.dependencies || {})) {
              if (ver.startsWith('workspace:') && versions[dep]) {
                fw.dependencies[dep] = versions[dep];
              }
            }
            fs.writeFileSync(fwPath, JSON.stringify(fw, null, '\t') + '\n');
          "

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish builder-esbuild
        run: npm publish --provenance --access public --ignore-scripts
        working-directory: packages/builder-esbuild

      - name: Publish framework-react-esbuild
        run: npm publish --provenance --access public --ignore-scripts
        working-directory: packages/framework-react-esbuild

      - name: Get new version
        id: version
        run: echo "version=$(node -p "require('./packages/builder-esbuild/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/builder-esbuild/package.json packages/framework-react-esbuild/package.json
          git commit -m "v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push --tags
